title: Default
fields:
  -
    handle: seo_title
    field:
      type: text
      display: 'SEO Title'
      instructions: 'Overrides the page title in search results. Keep under 60 characters.'
  -
    handle: seo_description
    field:
      type: textarea
      display: 'SEO Description'
      instructions: 'Shown in search results under the title. Keep between 120–160 characters.'
  -
    handle: content
    field:
      type: markdown
      display: Content
      localizable: true
      escape_markup: true
  -
    handle: author
    field:
      type: users
      display: Author
      default: current
      localizable: true
      max_items: 1
  -
    handle: template
    field:
      type: template
      display: Template
      localizable: true
