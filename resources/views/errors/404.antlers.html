<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found — {{ config:app.name }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: #2D2B8F;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .logo {
            font-family: 'Raleway', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 3rem;
            letter-spacing: -0.02em;
        }
        .logo span { color: #F5C518; }
        .code {
            font-family: 'Raleway', sans-serif;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 800;
            color: rgba(255,255,255,0.08);
            line-height: 1;
            margin-bottom: -1rem;
        }
        h1 {
            font-family: 'Raleway', sans-serif;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 700;
            color: #fff;
            margin-bottom: 1rem;
        }
        p {
            color: rgba(255,255,255,0.55);
            font-size: 1rem;
            max-width: 380px;
            line-height: 1.7;
            margin-bottom: 2.5rem;
        }
        .actions { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
        .btn-primary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: #F5C518; color: #111; font-weight: 700;
            padding: 0.875rem 1.75rem; border-radius: 9999px;
            text-decoration: none; font-size: 0.9rem;
            transition: filter 0.15s;
        }
        .btn-primary:hover { filter: brightness(1.08); }
        .btn-secondary {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: rgba(255,255,255,0.1); color: #fff; font-weight: 600;
            padding: 0.875rem 1.75rem; border-radius: 9999px;
            text-decoration: none; font-size: 0.9rem;
            transition: background 0.15s;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.18); }
        .links {
            margin-top: 3rem;
            display: flex; gap: 2rem; flex-wrap: wrap; justify-content: center;
        }
        .links a {
            color: rgba(255,255,255,0.4);
            text-decoration: none; font-size: 0.85rem;
            transition: color 0.15s;
        }
        .links a:hover { color: rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div class="logo">FMK<span>Schools</span></div>
    <div class="code">404</div>
    <h1>Page Not Found</h1>
    <p>The page you're looking for doesn't exist or may have been moved. Let's get you back on track.</p>
    <div class="actions">
        <a href="/" class="btn-primary">Go to Homepage</a>
        <a href="/contact" class="btn-secondary">Contact Us</a>
    </div>
    <div class="links">
        <a href="/about/our-story">About Us</a>
        <a href="/academics/early-years">Academics</a>
        <a href="/admissions/apply">Admissions</a>
        <a href="/news">News &amp; Events</a>
    </div>
</body>
</html>
