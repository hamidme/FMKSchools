<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: sans-serif; font-size: 15px; color: #333; background: #f4f4f4; margin: 0; padding: 0; }
  .wrap { max-width: 560px; margin: 32px auto; background: #fff; border-radius: 12px; overflow: hidden; }
  .header { background: #2D2B8F; padding: 28px 32px; }
  .header h1 { color: #fff; font-size: 20px; margin: 0; }
  .header p { color: rgba(255,255,255,0.6); font-size: 13px; margin: 4px 0 0; }
  .body { padding: 28px 32px; }
  .field { margin-bottom: 18px; }
  .label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #999; margin-bottom: 4px; }
  .value { font-size: 15px; color: #111; }
  .message-box { background: #f8f8f8; border-left: 3px solid #2D2B8F; padding: 14px 16px; border-radius: 4px; white-space: pre-wrap; }
  .footer { padding: 16px 32px; background: #f4f4f4; font-size: 12px; color: #aaa; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1>New Enquiry from Website</h1>
    <p>Submitted via fmkschools.edu.ng</p>
  </div>
  <div class="body">
    <div class="field">
      <div class="label">Name</div>
      <div class="value">{{ name }}</div>
    </div>
    <div class="field">
      <div class="label">Email</div>
      <div class="value"><a href="mailto:{{ email }}" style="color:#2D2B8F;">{{ email }}</a></div>
    </div>
    {{ if phone }}
    <div class="field">
      <div class="label">Phone</div>
      <div class="value">{{ phone }}</div>
    </div>
    {{ /if }}
    <div class="field">
      <div class="label">Subject</div>
      <div class="value">{{ subject }}</div>
    </div>
    <div class="field">
      <div class="label">Message</div>
      <div class="message-box">{{ message }}</div>
    </div>
  </div>
  <div class="footer">FMKS Schools · Reply directly to this email to respond to {{ name }}</div>
</div>
</body>
</html>
